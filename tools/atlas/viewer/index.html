<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Latitude Atlas Viewer</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #1d232f;
      --muted: #5f6675;
      --border: #d8dde6;
      --accent: #0f6ec8;
      --warn: #a0522d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at 10% -10%, #ffffff 0%, var(--bg) 55%);
      color: var(--ink);
      font-family: "Segoe UI", "Trebuchet MS", Arial, sans-serif;
    }
    .wrap { max-width: 1400px; margin: 0 auto; padding: 16px; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 8px 26px rgba(20, 40, 60, 0.06);
      padding: 12px;
    }
    .toolbar {
      display: grid;
      grid-template-columns: repeat(4, minmax(180px, 1fr));
      gap: 10px;
      align-items: end;
    }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 12px; color: var(--muted); }
    select, button {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 14px;
      background: #fff;
    }
    button { cursor: pointer; }
    button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .grid {
      margin-top: 12px;
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr 320px;
    }
    .viewerBox { position: relative; overflow: auto; min-height: 360px; background: #0f1318; border-radius: 10px; display:flex; align-items:stretch; }
    .stack { position: relative; display: block; line-height: 0; width: 100%; min-height: 360px; }
    .stack img, .stack canvas { display: block; width: 100%; height: auto; image-rendering: pixelated; image-rendering: crisp-edges; }
    .overlay { position: absolute; inset: 0; pointer-events: none; opacity: 0.55; }
    .pickCanvas { position: absolute; inset: 0; pointer-events: auto; background: transparent; }
    .highlightCanvas { position: absolute; inset: 0; pointer-events: none; }
    .side { display: flex; flex-direction: column; gap: 12px; }
    .muted { color: var(--muted); font-size: 12px; }
    .status { font-size: 13px; color: var(--warn); min-height: 18px; }
    .overlayList { display: flex; flex-direction: column; gap: 6px; max-height: 220px; overflow: auto; }
    .overlayItem { display: flex; gap: 8px; align-items: center; font-size: 13px; }
    .biomeList { display: flex; flex-direction: column; gap: 4px; max-height: 260px; overflow: auto; }
    .biomeRow {
      display: grid;
      grid-template-columns: 16px 1fr auto;
      gap: 8px;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 8px;
      font-size: 12px;
      cursor: pointer;
      background: #fff;
    }
    .biomeRow.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent) inset;
      background: #f1f7ff;
    }
    .swatch {
      width: 14px;
      height: 14px;
      border: 1px solid #00000033;
      border-radius: 3px;
    }
    pre {
      margin: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fafbfe;
      padding: 8px;
      font-size: 12px;
      max-height: 220px;
      overflow: auto;
    }
    .kv { display: grid; grid-template-columns: 110px 1fr; gap: 4px 8px; font-size: 12px; }
    .chip { display: inline-block; width: 14px; height: 14px; border: 1px solid #00000033; border-radius: 3px; vertical-align: middle; margin-right: 6px; }
    @media (max-width: 1080px) {
      .toolbar { grid-template-columns: 1fr 1fr; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <div class="toolbar">
      <div class="field">
        <label for="runSelect">Run</label>
        <select id="runSelect"></select>
      </div>
      <div class="field">
        <label for="layerSelect">Layer</label>
        <select id="layerSelect"></select>
      </div>
      <div class="field">
        <label for="highlightToggle">Inspect</label>
        <label class="overlayItem"><input id="highlightToggle" type="checkbox" disabled/> Highlight same biome (if ids available)</label>
      </div>
      <div class="field">
        <label>Actions</label>
        <div style="display:flex; gap:8px;">
          <button id="refreshBtn" class="primary">Refresh</button>
          <button id="latestBtn">Latest</button>
        </div>
      </div>
    </div>
    <div id="status" class="status"></div>
  </div>

  <div class="grid">
    <div class="panel viewerBox">
      <div id="stack" class="stack" hidden>
        <img id="baseImg" alt="atlas layer"/>
        <div id="overlayHost" class="overlay"></div>
        <canvas id="highlightCanvas" class="highlightCanvas"></canvas>
        <canvas id="pickCanvas" class="pickCanvas"></canvas>
      </div>
      <div id="empty" style="color:#dce2ee; padding:22px;">No stamped runs found. Generate a run from Atlas menu, then click Refresh.</div>
    </div>

    <div class="side">
      <div class="panel">
        <div style="font-weight:600; margin-bottom:8px;">Overlays</div>
        <div id="overlayList" class="overlayList"><div class="muted">No overlay assets in this layer.</div></div>
      </div>

      <div class="panel">
        <div style="font-weight:600; margin-bottom:8px;">Biomes</div>
        <div id="biomeLegend" class="biomeList"><div class="muted">Index assets missing for this layer.</div></div>
      </div>

      <div class="panel">
        <div style="font-weight:600; margin-bottom:8px;">Inspect</div>
        <div class="kv">
          <div class="muted">Run</div><div id="iRun">-</div>
          <div class="muted">Layer</div><div id="iLayer">-</div>
          <div class="muted">Pixel</div><div id="iPixel">-</div>
          <div class="muted">Biome</div><div id="iBiome">unknown</div>
          <div class="muted">Color</div><div id="iColor">-</div>
        </div>
      </div>

      <div class="panel">
        <div style="font-weight:600; margin-bottom:8px;">Manifest</div>
        <pre id="manifest">(none)</pre>
      </div>
    </div>
  </div>
</div>

<script>
const runSelect = document.getElementById("runSelect");
const layerSelect = document.getElementById("layerSelect");
const refreshBtn = document.getElementById("refreshBtn");
const latestBtn = document.getElementById("latestBtn");
const overlayList = document.getElementById("overlayList");
const biomeLegend = document.getElementById("biomeLegend");
const overlayHost = document.getElementById("overlayHost");
const statusEl = document.getElementById("status");
const manifestEl = document.getElementById("manifest");
const baseImg = document.getElementById("baseImg");
const stack = document.getElementById("stack");
const emptyEl = document.getElementById("empty");
const pickCanvas = document.getElementById("pickCanvas");
const highlightCanvas = document.getElementById("highlightCanvas");
const highlightToggle = document.getElementById("highlightToggle");

const inspectEls = {
  run: document.getElementById("iRun"),
  layer: document.getElementById("iLayer"),
  pixel: document.getElementById("iPixel"),
  biome: document.getElementById("iBiome"),
  color: document.getElementById("iColor")
};

const state = {
  runs: [],
  runId: null,
  files: [],
  layers: [],
  layerName: null,
  overlays: [],
  overlayEnabled: new Set(),
  manifest: null,
  baseCanvas: document.createElement("canvas"),
  biomeIndex: null,
  biomeStats: [],
  selectedBiomeId: null,
  selectedBiomeIndex: null
};

function setStatus(msg) {
  statusEl.textContent = msg || "";
}

async function fetchText(url) {
  const r = await fetch(url, { cache: "no-store" });
  if (!r.ok) throw new Error(`${r.status} ${r.statusText} for ${url}`);
  return r.text();
}

async function fetchJson(url) {
  const r = await fetch(url, { cache: "no-store" });
  if (!r.ok) throw new Error(`${r.status} ${r.statusText} for ${url}`);
  return r.json();
}

function parseHrefNames(html) {
  return [...html.matchAll(/href="([^"]+)"/gi)].map((m) => decodeURIComponent(m[1]));
}

function parseStep(name) {
  const m = name.match(/step(\d+)/i);
  return m ? Number(m[1]) : -1;
}

function stepToken(name) {
  const m = String(name || "").match(/(step\d+)/i);
  return m ? m[1].toLowerCase() : null;
}

function parseRunFromUrl() {
  const u = new URL(window.location.href);
  const run = u.searchParams.get("run") || u.searchParams.get("runId");
  if (!run) return null;
  if (!/^\d{8}-\d{6}$/.test(run)) return null;
  return run;
}

function rgbToHex(r, g, b) {
  return `#${[r, g, b].map((v) => v.toString(16).padStart(2, "0")).join("").toUpperCase()}`;
}

function rgbToIndex(r, g, b) {
  // Current exporter stores biome index as grayscale (same value in R/G/B).
  if (r === g && g === b) return r & 0xFF;
  // Fallback path for potential future 24-bit index encoding.
  return (r & 0xFF) | ((g & 0xFF) << 8) | ((b & 0xFF) << 16);
}

function runBase(runId) {
  return `/run-headless/latdev/atlas-runs/${runId}`;
}

async function listRuns() {
  const html = await fetchText("/run-headless/latdev/atlas-runs/");
  const runs = parseHrefNames(html)
    .map((h) => h.replace(/\/$/, ""))
    .filter((n) => /^\d{8}-\d{6}$/.test(n))
    .sort();
  return runs;
}

async function listRunFiles(runId) {
  const html = await fetchText(`${runBase(runId)}/`);
  return parseHrefNames(html)
    .filter((h) => !h.endsWith("/"))
    .map((n) => n.trim())
    .filter(Boolean);
}

function classifyLayers(files) {
  const pngs = files.filter((f) => /\.png$/i.test(f));
  const rankLayer = (name) => {
    const n = name.toLowerCase();
    if (/_biomes\.png$/.test(n) || /^biomes\.png$/.test(n)) return 0;
    if (/bands\.png$/.test(n)) return 1;
    if (/temperature\.png$/.test(n)) return 2;
    if (/humidity\.png$/.test(n)) return 3;
    if (/continentalness\.png$/.test(n)) return 4;
    if (/biome_ids\.png$/.test(n)) return 5;
    if (/mask_/.test(n)) return 6;
    return 7;
  };
  const layers = pngs.map((name) => ({
    name,
    step: parseStep(name),
    rank: rankLayer(name)
  })).sort((a, b) => {
    const sa = a.step > -1 ? a.step : Number.MAX_SAFE_INTEGER;
    const sb = b.step > -1 ? b.step : Number.MAX_SAFE_INTEGER;
    return sa - sb || a.rank - b.rank || a.name.localeCompare(b.name);
  });
  return layers;
}

function classifyOverlays(files, baseLayerName) {
  const pngs = files.filter((f) => /\.png$/i.test(f) && f !== baseLayerName);
  const wanted = pngs.filter((n) => /mask_|ids|overlay|debug|bands|temperature|humidity|continentalness/i.test(n));
  return wanted.sort((a, b) => a.localeCompare(b));
}

async function loadManifest(runId) {
  try {
    const m = await fetchJson(`${runBase(runId)}/run_manifest.json`);
    state.manifest = m;
    manifestEl.textContent = JSON.stringify(m, null, 2);
  } catch (e) {
    state.manifest = null;
    if (String(e.message).includes("404")) {
      manifestEl.textContent = "Run exists but manifest not found - did Atlas.cmd finish successfully?";
    } else {
      manifestEl.textContent = String(e.message || e);
    }
  }
}

function renderRunDropdown() {
  runSelect.innerHTML = "";
  for (const runId of state.runs) {
    const opt = document.createElement("option");
    opt.value = runId;
    opt.textContent = runId;
    runSelect.appendChild(opt);
  }
  if (state.runId && state.runs.includes(state.runId)) runSelect.value = state.runId;
}

function renderLayerDropdown() {
  layerSelect.innerHTML = "";
  for (const layer of state.layers) {
    const opt = document.createElement("option");
    opt.value = layer.name;
    const stepLabel = layer.step > -1 ? `step${layer.step}` : "layer";
    opt.textContent = `${stepLabel} - ${layer.name}`;
    layerSelect.appendChild(opt);
  }
  if (state.layerName) layerSelect.value = state.layerName;
}

function renderBiomeLegend() {
  biomeLegend.innerHTML = "";
  if (!state.biomeStats.length) {
    biomeLegend.innerHTML = '<div class="muted">Index assets missing for this layer.</div>';
    return;
  }

  for (const row of state.biomeStats) {
    const el = document.createElement("button");
    el.type = "button";
    el.className = "biomeRow" + (state.selectedBiomeId === row.biomeId ? " active" : "");
    el.innerHTML = `<span class="swatch" style="background:${row.color};"></span><span title="${row.biomeId}">${row.biomeId}</span><span>${row.count} (${row.percent}%)</span>`;
    el.addEventListener("click", () => {
      selectBiomeById(row.biomeId);
    });
    biomeLegend.appendChild(el);
  }
}

function renderOverlayToggles() {
  overlayList.innerHTML = "";
  if (!state.overlays.length) {
    overlayList.innerHTML = '<div class="muted">No overlay assets in this layer.</div>';
    overlayHost.innerHTML = "";
    return;
  }
  for (const name of state.overlays) {
    const id = `ov_${name.replace(/[^a-z0-9]+/gi, "_")}`;
    const row = document.createElement("label");
    row.className = "overlayItem";
    row.innerHTML = `<input id="${id}" type="checkbox"/> <span>${name}</span>`;
    const cb = row.querySelector("input");
    cb.checked = state.overlayEnabled.has(name);
    cb.addEventListener("change", () => {
      if (cb.checked) state.overlayEnabled.add(name); else state.overlayEnabled.delete(name);
      renderOverlayImages();
    });
    overlayList.appendChild(row);
  }
  renderOverlayImages();
}

function renderOverlayImages() {
  overlayHost.innerHTML = "";
  const runId = state.runId;
  if (!runId) return;
  for (const name of state.overlays) {
    if (!state.overlayEnabled.has(name)) continue;
    const img = document.createElement("img");
    img.src = `${runBase(runId)}/${encodeURIComponent(name)}?t=${Date.now()}`;
    img.alt = name;
    img.style.position = "absolute";
    img.style.inset = "0";
    img.style.width = "100%";
    img.style.height = "100%";
    img.style.objectFit = "contain";
    img.style.pointerEvents = "none";
    img.style.mixBlendMode = "screen";
    overlayHost.appendChild(img);
  }
}

async function loadBiomeIndexArtifacts(runId, files) {
  state.biomeIndex = null;
  state.biomeStats = [];
  state.selectedBiomeId = null;
  state.selectedBiomeIndex = null;

  const token = stepToken(state.layerName);
  const idsName = files.find((f) => token && f.toLowerCase() === `${token}_biome_ids.png`)
    || files.find((f) => /^biome_ids\.png$/i.test(f))
    || files.find((f) => /(?:^|_)biome_ids\.png$/i.test(f));
  const paletteName = files.find((f) => token && f.toLowerCase() === `${token}_biome_palette.json`)
    || files.find((f) => /^biome_palette\.json$/i.test(f))
    || files.find((f) => /(?:^|_)biome_palette\.json$/i.test(f));
  if (!idsName || !paletteName) return;

  try {
    const paletteJson = await fetchJson(`${runBase(runId)}/${paletteName}`);
    const entries = Array.isArray(paletteJson.biomes) ? paletteJson.biomes : [];
    const indexToBiome = new Map();
    const biomeToIndex = new Map();
    const indexToColor = new Map();
    for (const e of entries) {
      if (typeof e.index === "number" && typeof e.biome_id === "string") {
        indexToBiome.set(e.index, e.biome_id);
        if (!biomeToIndex.has(e.biome_id)) biomeToIndex.set(e.biome_id, e.index);
        if (typeof e.displayColor === "string") indexToColor.set(e.index, e.displayColor);
      }
    }

    const img = new Image();
    await new Promise((resolve, reject) => {
      img.onload = resolve;
      img.onerror = () => reject(new Error("Failed loading biome_ids.png"));
      img.src = `${runBase(runId)}/${idsName}?t=${Date.now()}`;
    });

    const c = document.createElement("canvas");
    c.width = img.naturalWidth;
    c.height = img.naturalHeight;
    const ctx = c.getContext("2d", { willReadFrequently: true });
    ctx.drawImage(img, 0, 0);
    const data = ctx.getImageData(0, 0, c.width, c.height).data;
    const indexCounts = new Map();
    const total = c.width * c.height;
    for (let i = 0; i < total; i++) {
      const p = i * 4;
      const idx = rgbToIndex(data[p], data[p + 1], data[p + 2]);
      indexCounts.set(idx, (indexCounts.get(idx) || 0) + 1);
    }

    const stats = [];
    for (const [idx, count] of indexCounts.entries()) {
      const biomeId = indexToBiome.get(idx) || `index ${idx}`;
      const pct = (count * 100) / total;
      stats.push({
        biomeId,
        index: idx,
        count,
        percent: pct.toFixed(2),
        color: indexToColor.get(idx) || "#8A8A8A"
      });
    }
    stats.sort((a, b) => b.count - a.count);

    state.biomeIndex = {
      width: c.width,
      height: c.height,
      data,
      indexToBiome,
      biomeToIndex
    };
    state.biomeStats = stats;
  } catch (e) {
    console.warn(e);
  }
}

function clearHighlight() {
  const c = highlightCanvas;
  const ctx = c.getContext("2d");
  ctx.clearRect(0, 0, c.width, c.height);
}

function drawBiomeHighlight(targetIndex) {
  if (!state.biomeIndex) return;
  const b = state.biomeIndex;
  const c = highlightCanvas;
  const ctx = c.getContext("2d");
  const out = ctx.createImageData(c.width, c.height);
  for (let i = 0, p = 0; i < b.width * b.height; i++, p += 4) {
    const idx = rgbToIndex(b.data[p], b.data[p + 1], b.data[p + 2]);
    if (idx !== targetIndex) continue;
    out.data[p] = 250;
    out.data[p + 1] = 240;
    out.data[p + 2] = 30;
    out.data[p + 3] = 95;
  }
  ctx.putImageData(out, 0, 0);
}

function selectBiomeByIndex(index) {
  if (!state.biomeIndex) return;
  const biomeId = state.biomeIndex.indexToBiome.get(index) || `index ${index}`;
  state.selectedBiomeIndex = index;
  state.selectedBiomeId = biomeId;
  renderBiomeLegend();
  if (highlightToggle.checked) {
    drawBiomeHighlight(index);
  } else {
    clearHighlight();
  }
}

function selectBiomeById(biomeId) {
  if (!state.biomeIndex || !state.biomeIndex.biomeToIndex) return;
  const idx = state.biomeIndex.biomeToIndex.get(biomeId);
  if (idx == null) return;
  selectBiomeByIndex(idx);
}

function setInspector(data) {
  inspectEls.run.textContent = data.run || "-";
  inspectEls.layer.textContent = data.layer || "-";
  inspectEls.pixel.textContent = data.pixel || "-";
  inspectEls.biome.textContent = data.biome || "unknown";
  inspectEls.color.innerHTML = data.color
    ? `<span class="chip" style="background:${data.color};"></span>${data.color}`
    : "-";
}

function pickAtEvent(ev, clickMode) {
  if (!baseImg.naturalWidth || !baseImg.naturalHeight) return;

  const rect = baseImg.getBoundingClientRect();
  if (rect.width <= 0 || rect.height <= 0) return;
  const x = Math.floor((ev.clientX - rect.left) * (baseImg.naturalWidth / rect.width));
  const y = Math.floor((ev.clientY - rect.top) * (baseImg.naturalHeight / rect.height));
  if (x < 0 || y < 0 || x >= baseImg.naturalWidth || y >= baseImg.naturalHeight) return;

  const ctx = state.baseCanvas.getContext("2d", { willReadFrequently: true });
  const px = ctx.getImageData(x, y, 1, 1).data;
  const colorHex = rgbToHex(px[0], px[1], px[2]);

  let biomeId = "unknown";
  let biomeIndex = null;
  if (state.biomeIndex && x < state.biomeIndex.width && y < state.biomeIndex.height) {
    const p = ((y * state.biomeIndex.width) + x) * 4;
    biomeIndex = rgbToIndex(
      state.biomeIndex.data[p],
      state.biomeIndex.data[p + 1],
      state.biomeIndex.data[p + 2]
    );
    biomeId = state.biomeIndex.indexToBiome.get(biomeIndex) || `index ${biomeIndex}`;
  }

  setInspector({
    run: state.runId,
    layer: state.layerName,
    pixel: `${x}, ${y}`,
    biome: biomeId,
    color: colorHex
  });

  if (clickMode && highlightToggle.checked && biomeIndex != null) {
    drawBiomeHighlight(biomeIndex);
  }

  if (clickMode && biomeIndex != null) {
    selectBiomeByIndex(biomeIndex);
  }
}

function preparePickCanvas() {
  pickCanvas.width = baseImg.naturalWidth;
  pickCanvas.height = baseImg.naturalHeight;
  highlightCanvas.width = baseImg.naturalWidth;
  highlightCanvas.height = baseImg.naturalHeight;
  clearHighlight();
}

async function loadLayer() {
  const runId = state.runId;
  if (!runId || !state.layerName) return;

  const url = `${runBase(runId)}/${encodeURIComponent(state.layerName)}?t=${Date.now()}`;
  await new Promise((resolve, reject) => {
    baseImg.onload = resolve;
    baseImg.onerror = () => reject(new Error(`Failed to load layer image: ${state.layerName}`));
    baseImg.src = url;
  });

  state.baseCanvas.width = baseImg.naturalWidth;
  state.baseCanvas.height = baseImg.naturalHeight;
  const ctx = state.baseCanvas.getContext("2d", { willReadFrequently: true });
  ctx.drawImage(baseImg, 0, 0);
  preparePickCanvas();
  if (state.selectedBiomeIndex != null && highlightToggle.checked) {
    drawBiomeHighlight(state.selectedBiomeIndex);
  }
}

async function loadRun(runId, keepLayer) {
  state.runId = runId;
  setStatus("");
  await loadManifest(runId);

  const files = await listRunFiles(runId);
  state.files = files;
  state.layers = classifyLayers(files);

  if (!state.layers.length) {
    stack.hidden = true;
    emptyEl.hidden = false;
    emptyEl.textContent = `Run ${runId} has no PNG layers.`;
    state.layerName = null;
    renderLayerDropdown();
    state.biomeStats = [];
    state.biomeIndex = null;
    highlightToggle.checked = false;
    highlightToggle.disabled = true;
    renderBiomeLegend();
    return;
  }

  const preserved = keepLayer && state.layers.find((l) => l.name === keepLayer) ? keepLayer : null;
  state.layerName = preserved || state.layers[0].name;

  state.overlays = classifyOverlays(files, state.layerName);
  state.overlayEnabled = new Set();
  renderOverlayToggles();
  renderLayerDropdown();

  await loadBiomeIndexArtifacts(runId, files);
  renderBiomeLegend();
  if (!state.biomeIndex) {
    highlightToggle.checked = false;
    highlightToggle.disabled = true;
    setStatus("Index assets missing for this layer; biome id selection/highlight is disabled.");
  } else {
    highlightToggle.disabled = false;
  }
  await loadLayer();

  stack.hidden = false;
  emptyEl.hidden = true;
}

async function refreshRuns(keepRun) {
  const runs = await listRuns();
  state.runs = runs;

  if (!runs.length) {
    runSelect.innerHTML = "";
    layerSelect.innerHTML = "";
    stack.hidden = true;
    emptyEl.hidden = false;
    emptyEl.textContent = "No stamped runs found under /run-headless/latdev/atlas-runs/.";
    setInspector({});
    manifestEl.textContent = "(none)";
    state.biomeStats = [];
    state.biomeIndex = null;
    highlightToggle.checked = false;
    highlightToggle.disabled = true;
    renderBiomeLegend();
    return;
  }

  const explicit = parseRunFromUrl();
  const preferred = keepRun && runs.includes(keepRun)
    ? keepRun
    : (explicit && runs.includes(explicit) ? explicit : runs[runs.length - 1]);

  state.runId = preferred;
  renderRunDropdown();
  await loadRun(preferred, null);
}

runSelect.addEventListener("change", async () => {
  await loadRun(runSelect.value, null).catch((e) => setStatus(String(e.message || e)));
});

layerSelect.addEventListener("change", async () => {
  state.layerName = layerSelect.value;
  state.overlays = classifyOverlays(state.files, state.layerName);
  state.overlayEnabled = new Set();
  renderOverlayToggles();
  await loadBiomeIndexArtifacts(state.runId, state.files);
  renderBiomeLegend();
  await loadLayer().catch((e) => setStatus(String(e.message || e)));
});

refreshBtn.addEventListener("click", async () => {
  await refreshRuns(state.runId).catch((e) => setStatus(String(e.message || e)));
});

latestBtn.addEventListener("click", async () => {
  await refreshRuns(null).catch((e) => setStatus(String(e.message || e)));
});

pickCanvas.addEventListener("mousemove", (e) => pickAtEvent(e, false));
pickCanvas.addEventListener("click", (e) => pickAtEvent(e, true));

highlightToggle.addEventListener("change", () => {
  if (!highlightToggle.checked) {
    clearHighlight();
    return;
  }
  if (state.selectedBiomeIndex != null) {
    drawBiomeHighlight(state.selectedBiomeIndex);
  }
});

refreshRuns(null).catch((e) => setStatus(String(e.message || e)));
</script>
</body>
</html>
