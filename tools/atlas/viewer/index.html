<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Latitude Atlas Viewer (MVP)</title>
  <style>
    body { font-family: system-ui, Segoe UI, Arial, sans-serif; margin: 16px; }
    .row { margin: 10px 0; }
    img { max-width: 100%; height: auto; border: 1px solid #ccc; }
    code { background: #f4f4f4; padding: 2px 6px; border-radius: 4px; }
    .small { color: #666; font-size: 12px; }
    button { padding: 8px 12px; }
  </style>
</head>
<body>
  <h2>Latitude Atlas Viewer (MVP)</h2>

  <div class="row small">
    This MVP shows the latest stamped runs PNG + manifest. Later well add overlays, palette, compare, etc.
  </div>

  <div class="row">
    <div><b>Current run:</b> <code id="runPath">(loading)</code></div>
    <pre id="manifest" class="small"></pre>
  </div>

  <div class="row">
    <img id="atlasImg" alt="atlas png will appear here"/>
  </div>

  <div class="row">
    <button id="refreshBtn">Refresh latest</button>
  </div>

<script>
async function fetchText(url) {
  const r = await fetch(url, { cache: "no-store" });
  if (!r.ok) throw new Error(`${r.status} ${r.statusText} for ${url}`);
  return await r.text();
}

async function fetchJson(url) {
  const r = await fetch(url, { cache: "no-store" });
  if (!r.ok) throw new Error(`${r.status} ${r.statusText} for ${url}`);
  return await r.json();
}

function pickBestPngName(listingHtml) {
  const matches = [...listingHtml.matchAll(/href="([^"]+\.png)"/gi)].map(m => m[1]);
  if (!matches.length) return null;

  // Prefer higher step values when present (e.g., step128 > step64 > step32).
  return matches
    .map((name) => {
      const stepMatch = name.match(/step(\d+)/i);
      const step = stepMatch ? Number(stepMatch[1]) : -1;
      return { name, step };
    })
    .sort((a, b) => b.step - a.step || a.name.localeCompare(b.name))[0].name;
}

function pickNewestRunDir(entries) {
  return entries.sort().at(-1);
}

async function listRunDirs() {
  const html = await fetchText("/run-headless/latdev/atlas-runs/");
  const re = /href="(\d{8}-\d{6})\/"/g;
  const dirs = [];
  let m;
  while ((m = re.exec(html)) !== null) dirs.push(m[1]);
  return dirs;
}

function getRunFromUrl() {
  const u = new URL(window.location.href);
  // allow ?run= or ?runId=
  const run = u.searchParams.get("run") || u.searchParams.get("runId");
  if (!run) return null;
  if (!/^\d{8}-\d{6}$/.test(run)) throw new Error(`Invalid run id: ${run}`);
  return run;
}

async function resolveRunId() {
  // explicit > latest
  const explicit = getRunFromUrl();
  if (explicit) return explicit;
  const dirs = await listRunDirs();
  if (!dirs.length) return null;
  return pickNewestRunDir(dirs);
}

async function loadRun(runId) {
  const base = `/run-headless/latdev/atlas-runs/${runId}`;
  document.getElementById("runPath").textContent = base;

  let manifest;
  try {
    manifest = await fetchJson(`${base}/run_manifest.json`);
  } catch (e) {
    if (String(e && e.message).includes("404")) {
      throw new Error("Run exists but manifest not found - did Atlas.cmd finish successfully?");
    }
    throw e;
  }
  document.getElementById("manifest").textContent =
    JSON.stringify(manifest, null, 2);

  const listing = await fetchText(`${base}/`);
  const pngName = pickBestPngName(listing);
  if (!pngName) throw new Error("No .png found in run folder.");

  document.getElementById("atlasImg").src = `${base}/${pngName}`;
}

async function loadSelected() {
  const runId = await resolveRunId();
  if (!runId) {
    document.getElementById("runPath").textContent = "(no runs found)";
    document.getElementById("manifest").textContent =
      "No stamped atlas runs found under /run-headless/latdev/atlas-runs/.\nUse Atlas > Generate new run, then click Refresh latest.";
    document.getElementById("atlasImg").removeAttribute("src");
    return;
  }
  await loadRun(runId);
}

document.getElementById("refreshBtn").addEventListener("click", () => {
  loadSelected().catch((e) => {
    document.getElementById("manifest").textContent = String(e && e.message ? e.message : e);
    alert(e.message);
  });
});

loadSelected().catch((e) => {
  document.getElementById("manifest").textContent = String(e && e.message ? e.message : e);
  alert(e.message);
});
</script>
</body>
</html>
